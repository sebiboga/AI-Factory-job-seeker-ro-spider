name: AI Factory — Resume Derivation

on:
  workflow_dispatch:
    inputs:
      repo_name:
        description: "Name of the incomplete scraper repo (e.g. west-co-impex-srl-nodejs-scraper)"
        required: true
        type: string
      company:
        description: "Company name (if config/company.json not yet set and cannot be inferred)"
        required: false
        type: string
      cif:
        description: "CIF (if config/company.json not yet set and cannot be inferred from the repo)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  resume:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
      SOLR_AUTH: ${{ secrets.SOLR_AUTH }}
      REPO_NAME: ${{ inputs.repo_name }}
      COMPANY_NAME: ${{ inputs.company }}
      COMPANY_CIF: ${{ inputs.cif }}

    steps:
      - name: Checkout AI Factory repo
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Chrome
        run: |
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub \
            | sudo gpg --dearmor -o /etc/apt/keyrings/google-chrome.gpg
          echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/google-chrome.gpg]" \
            "http://dl.google.com/linux/chrome/deb/ stable main" \
            | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -qq && sudo apt-get install -y -qq google-chrome-stable

      - name: Start Chrome with remote debugging
        run: |
          google-chrome --remote-debugging-port=9222 --headless --no-sandbox \
            --disable-dev-shm-usage --disable-gpu &
          sleep 3

      - name: Install OpenCode CLI
        run: npm install -g opencode-ai

      - name: Configure opencode.json
        run: |
          cat > opencode.json << 'OPNCFG'
          {
            "$schema": "https://opencode.ai/config.json",
            "model": "opencode/big-pickle",
            "instructions": ["RESUME-ALGORITHM.md"],
            "mcp": {
              "chrome-devtools": {
                "type": "local",
                "command": ["npx", "-y", "chrome-devtools-mcp@latest", "--browser-url=http://127.0.0.1:9222"]
              },
              "external-directory": {
                "type": "local",
                "command": ["npx", "-y", "external-directory-mcp@latest"]
              }
            }
          }
          OPNCFG

      - name: Verify gh auth
        run: gh auth status

      - name: Run OpenCode — resume and verify derivation
        timeout-minutes: 25
        run: |
          PROMPT="Resume and complete the derivation for the repo: ${REPO_NAME}. "
          PROMPT+="Read RESUME-ALGORITHM.md for the complete resume algorithm. "
          PROMPT+="Clone the repo, check each step of the verification checklist, "
          PROMPT+="and execute any missing steps. "
          PROMPT+="All steps must be executed autonomously — no user interaction is allowed. "

          opencode run "$PROMPT" \
            --dangerously-skip-permissions \
            --print-logs

      - name: Commit any algorithm updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git remote set-url origin https://${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}.git
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "chore: update resume algorithm with new context"
            git pull origin main --rebase -X theirs && git push
          else
            echo "No changes to commit"
          fi
